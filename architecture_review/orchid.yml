# orchid.yml — Architecture Review Board demo
#
# Multi-agent design review: structural engineering, cost estimation,
# and sustainability consulting. rag_augmented memory with structured
# entity tracking across design iterations.
#
# Usage:
#   ORCHID_CONFIG=orchid.yml uvicorn orchid_api.main:app
#   orchid chat interactive --config orchid.yml

agents:
  config_path: agents.yaml

llm:
  model: gemini/gemini-flash-latest
  ollama_api_base: http://host.docker.internal:11434

auth:
  dev_bypass: true

rag:
  vector_backend: qdrant
  qdrant_url: http://qdrant:6333
  embedding_model: ollama/nomic-embed-text

upload:
  vision_model: ollama/minicpm-v
  namespace: uploads
  max_size_mb: 20
  chunk_size: 1000
  chunk_overlap: 200

storage:
  class: sqlite
  dsn: ./.orchid-architecture_review.db

tracing:
  langsmith_tracing: false
