# orchid.yml — GraphRAG knowledge-base demo configuration
#
# Pairs with ``agents.yaml``.  The startup hook seeds the
# ``InMemoryGraphStore`` with org-chart entities and edges, plus a
# few text chunks for vector fan-out.
#
# Usage::
#
#   ORCHID_CONFIG=orchid.yml \
#     uvicorn orchid_api.main:app --port 8000
#
# Or via the CLI::
#
#   orchid chat send mychat "Who does Bob report to?" \
#     --config orchid.yml

# ── Agent config ─────────────────────────────────────────────
agents:
  config_path: agents.yaml

# ── LLM ──────────────────────────────────────────────────────
llm:
  model: gemini/gemini-flash-latest

# ── Auth (demo: dev bypass) ──────────────────────────────────
auth:
  dev_bypass: true

# ── RAG / Vector DB ──────────────────────────────────────────
rag:
  vector_backend: qdrant
  qdrant_url: http://qdrant:6333
  embedding_model: gemini/gemini-embedding-001  # 3072-d

# ── CLI-specific RAG override ────────────────────────────────
# When the CLI is used, this section replaces rag: above.
# ChromaDB runs on-disk (no Docker), ollama embeddings run locally.
cli_rag:
  vector_backend: chroma
  embedding_model: ollama/nomic-embed-text   # 768-d, runs locally

# ── Document upload ──────────────────────────────────────────
upload:
  namespace: uploads
  max_size_mb: 20

# ── Chat persistence ─────────────────────────────────────────
storage:
  class: sqlite
  dsn: ./.orchid-graph_kb.db

# ── Startup hook seeds the in-memory graph + vector chunks ───
startup:
  hook: ./hooks/startup.ts#bootstrapGraphKb

# ── Observability ────────────────────────────────────────────
tracing:
  langsmith_tracing: false
