# orchid.yml — Restaurant multi-agent demo (TypeScript port)
# Three agents: menu, orders, reviews with custom tools and RAG.

agents:
  config_path: ./agents.yaml

llm:
  model: gemini/gemini-flash-latest
  gemini_api_key: ${GEMINI_API_KEY}

auth:
  dev_bypass: true

rag:
  vector_backend: qdrant
  qdrant_url: http://qdrant:6333
  embedding_model: gemini/gemini-embedding-001
  gemini_api_key: ${GEMINI_API_KEY}

storage:
  class: sqlite
  dsn: ./.orchid-restaurant.db

startup:
  hook: ./hooks/startup.ts#bootstrapRestaurant

tracing:
  langsmith_tracing: false
