# orchid.yml — Tech Conference demo configuration
#
# Self-contained demo: four agents (venue navigator, schedule content,
# visitor services, speaker services) with RAG-based knowledge ingestion
# and SQLite storage. No MCP servers or external APIs required.
#
# Usage:
#   ORCHID_CONFIG=orchid.yml uvicorn orchid_api.main:app

# ── Agents ────────────────────────────────────────────────────
agents:
  config_path: agents.yaml

# ── LLM ───────────────────────────────────────────────────────
llm:
  model: ollama/llama3.2
  ollama_api_base: http://host.docker.internal:11434

# ── Auth (demo: dev bypass) ───────────────────────────────────
auth:
  dev_bypass: true
  # NOTE: the Python example used a custom identity resolver.
  # The TypeScript port keeps this example self-contained via dev bypass.

# ── RAG / Vector DB ──────────────────────────────────────────
rag:
  vector_backend: qdrant
  qdrant_url: http://qdrant:6333
  embedding_model: ollama/nomic-embed-text

# ── Document upload ───────────────────────────────────────────
upload:
  vision_model: ollama/minicpm-v
  namespace: uploads
  max_size_mb: 20
  chunk_size: 1000
  chunk_overlap: 200

# ── Chat persistence ─────────────────────────────────────────
storage:
  class: sqlite
  dsn: ./.orchid-tech-conference.db

# ── Startup hook seeds knowledge into RAG ────────────────────
startup:
  hook: ./hooks/startup.ts#seedConferenceKnowledge

# ── Observability ─────────────────────────────────────────────
tracing:
  langsmith_tracing: false
