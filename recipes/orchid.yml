# orchid.yml — Recipes example (TypeScript port)
#
# The startup hook seeds a small recipe corpus into the `recipes` namespace.

agents:
  config_path: agents.yaml

llm:
  model: ollama/llama3.2
  ollama_api_base: http://host.docker.internal:11434

auth:
  dev_bypass: true

rag:
  vector_backend: qdrant
  qdrant_url: http://qdrant:6333
  embedding_model: ollama/nomic-embed-text

upload:
  namespace: uploads
  max_size_mb: 20

storage:
  class: sqlite
  dsn: ./.orchid-recipes.db

startup:
  hook: ./hooks/startup.ts#seedRecipes

tracing:
  langsmith_tracing: false
