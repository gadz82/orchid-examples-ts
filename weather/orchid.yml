# orchid.yml — Weather agentic fleet runtime config
#
# Showcases:
#   - Remote MCP server (weather data) with auth.mode: none
#   - PostgreSQL storage with orchid-storage-postgres
#   - RAG chat summarization with sliding-window compression
#   - Combo of built-in tools and MCP-delegated tools
#   - Cross-agent orchestrator skills
#
# Usage:
#   ORCHID_CONFIG=orchid.yml uvicorn orchid_api.main:app
#
# Or via docker-compose:
#   docker compose up --build

# ── Agents ────────────────────────────────────────────────────
agents:
  config_path: agents.yaml

# ── LLM ───────────────────────────────────────────────────────
llm:
  model: ollama/llama3.2
  ollama_api_base: http://host.docker.internal:11434

# ── Auth ──────────────────────────────────────────────────────
auth:
  dev_bypass: true                      # Skip platform auth for local testing

# ── RAG / Vector DB ──────────────────────────────────────────
rag:
  vector_backend: qdrant
  qdrant_url: http://qdrant:6333
  embedding_model: ollama/nomic-embed-text

# ── Document upload ───────────────────────────────────────────
upload:
  vision_model: ollama/minicpm-v
  namespace: weather-uploads
  max_size_mb: 20
  chunk_size: 1000
  chunk_overlap: 200

# ── Chat persistence (PostgreSQL) ─────────────────────────────
storage:
  class: orchid_storage_postgres.OrchidPostgresChatStorage
  dsn: postgresql://orchid:${POSTGRES_PASSWORD}@postgres:5432/orchid

# ── Startup hook (RAG seed) ───────────────────────────────────
startup:
  hook: examples.weather.hooks.startup.bootstrap_weather

# ── Observability ─────────────────────────────────────────────
tracing:
  langsmith_tracing: false
