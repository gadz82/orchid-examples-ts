# agents.yaml — Car Dealer Expert Fleet (TypeScript port)
#
# This file does NOT define agents. All agents are created dynamically
# by the startup hook (hooks/startup.ts) which:
#
#   1. Reads car specification documents from configured content sources
#      using content tools (not a YAML agent).
#   2. Analyses document content using an LLM to identify specialisation topics.
#   3. Generates agent configurations and persists them to SQLite
#      via the config_storage table.
#
# The config_storage block tells Orchid to merge SQLite-stored agent
# configs into the graph at bootstrap time. Since mergeFromDb() runs
# AFTER the startup hook, the fleet is ready on first boot.
#
# After bootstrap the graph contains one agent per car brand found
# in the data/ directory.

version: "1"

defaults:
  llm:
    model: gemini/gemini-flash-latest
    temperature: 0.2
  rag:
    enabled: false

config_storage:
  enabled: true
  class: sqlite
  dsn: ~/.orchid/car-dealer-fleet.db

startup_hooks:
  - ./hooks/startup.ts

# ── Built-in tools ──────────────────────────────────────────
tools:
  get_model_specs:
    handler: "./tools/dealer.ts#getModelSpecs"
    description: "Get detailed specifications for a car model by reading its spec document from the data library."
    parameters:
      model:
        type: string
        description: "Car model name, e.g. 'Camry', 'F-150', 'Golf'."
        required: true
        default: ""
  compare_models:
    handler: "./tools/dealer.ts#compareModels"
    description: "Compare two car models side-by-side using their spec documents."
    parameters:
      model_a:
        type: string
        description: "First car model name."
        required: true
        default: ""
      model_b:
        type: string
        description: "Second car model name."
        required: true
        default: ""

# ── Agents are dynamically generated by the startup hook ────
agents: {}
