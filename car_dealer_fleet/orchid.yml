# orchid.yml — Car Dealer Expert Fleet (TypeScript port)
#
# Demonstrates a small fleet of specialised car-brand expert agents.
# The Python version built these dynamically from content sources; the
# TypeScript port keeps a static demo fleet for framework parity.
#
# Usage:
#   cd workspace-ts/examples-ts/car_dealer_fleet
#   npm install && npm start

agents:
  config_path: agents.yaml

llm:
  model: gemini/gemini-flash-latest

auth:
  dev_bypass: true

rag:
  enabled: false

storage:
  class: sqlite
  dsn: ./.orchid-car-dealer-fleet.db

# Startup hook — best-effort RAG seed for the demo fleet.
startup:
  hook: ./hooks/startup.ts#seedCarDealerFleet

tracing:
  langsmith_tracing: false
