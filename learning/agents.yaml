# agents.yaml — Learning example configuration (TypeScript port)
#
# The Python version demonstrated the Pollen + Bloom fan-out pattern:
# a weekly cron tick emitted one signal per active learner, and each
# signal triggered a Bloom under the ``addressed_to_user`` identity.
# That event-driven infrastructure (custom OrchidSignalProducer,
# APScheduler, SQLite signal queue) is not available in the TypeScript
# port, so the example is reduced to a single digest agent that can be
# invoked directly.

version: "1"

defaults:
  llm:
    model: "ollama/llama3.2"
    temperature: 0.2
  rag:
    enabled: false

supervisor:
  assistant_name: "Learning Assistant"

# ── Built-in tools ───────────────────────────────────────────
# Empty for the example — the digest agent uses its prompt only.
tools: {}

# ── Agents ───────────────────────────────────────────────────
agents:
  digest:
    description: >
      Personalised weekly learning digest. Receives a learner id
      and a week number, produces a Markdown summary of what they
      should focus on next.
    prompt: |
      You are the Weekly Learning Digest agent. Build a short
      personalised digest for the named learner. Format as
      Markdown with these sections:

      - Highlights from last week
      - Recommended next steps
      - One stretch goal

      Keep it to under 150 words.

    rag:
      enabled: false

    execution_hints:
      parallel_safe: true

# NOTE: The Python events/producers/triggers block has been removed
# because the TypeScript port does not yet support custom signal
# producers or cron-based fan-out.
