# agents.yaml — Learning example configuration (TypeScript port)
#
# Demonstrates the Pollen + Bloom fan-out pattern aligned with the
# Python version: a custom ``WeeklyDigestFanoutProducer`` enumerates
# active learners at cron time and emits one signal per ``(tenant, user)``,
# and a trigger maps each signal to the digest agent under the
# ``addressed_to`` identity flavour.

version: "1"

defaults:
  llm:
    model: "ollama/llama3.2"
    temperature: 0.2
  rag:
    enabled: false

supervisor:
  assistant_name: "Learning Assistant"

# ── Built-in tools ───────────────────────────────────────────
# Empty for the example — the digest agent uses its prompt only.
tools: {}

# ── Agents ───────────────────────────────────────────────────
agents:
  digest:
    description: >
      Personalised weekly learning digest. Receives a learner id
      and a week number, produces a Markdown summary of what they
      should focus on next.
    prompt: |
      You are the Weekly Learning Digest agent. Build a short
      personalised digest for the named learner. Format as
      Markdown with these sections:

      - Highlights from last week
      - Recommended next steps
      - One stretch goal

      Keep it to under 150 words.

    rag:
      enabled: false

    execution_hints:
      parallel_safe: true

# ── Pollen + Bloom (events) ──────────────────────────────────
# Weekly fan-out — the custom WeeklyDigestFanoutProducer enumerates
# active learners and emits one ``weekly-digest.due`` signal per
# (tenant, user).  Each signal triggers a Bloom under the
# ``addressed_to`` identity flavour.
#
# Demonstrates:
#
#   * Custom ``OrchidEventProducer`` (the integrator-extensible
#     pattern, built into the example for didactic clarity).
#   * ``addressed_to`` identity flavour: the digest runs scoped
#     to a specific user's RAG visibility.
#   * One trigger, N parallel runs (one per user).
#   * Default visibility = ``addressed`` — each user only sees
#     their own digest, never another user's.
events:
  enabled: true

  queue:
    backend: memory
    visibilityTimeoutSeconds: 30
    maxReceiveCount: 2
    leasePollIntervalMs: 200

  producers:
    - class: ./producers/weeklyDigest.js#WeeklyDigestFanoutProducer
      extraArgs:
        cron: "0 6 * * 1"
        tenantProvider:
          type: static
          tenants: ["learning-demo"]
        userLister:
          type: static
          usersByTenant:
            learning-demo: ["u-alice", "u-bob"]

  processors:
    - type: async-pool
      config:
        concurrency: 4

  triggers:
    - signal: weekly-digest.due
      action: invoke-agent
      emits:
        - signal: weekly-digest.due
          payload:
            agent: digest
      retry:
        maxRetries: 2
        backoff: exponential
