# agents.yaml — Fallback YAML config for comparison with MD config.
#
# This file produces the SAME configuration as orchid.md + agents/*.md.
# Point the loader here:
#
#   AGENTS_CONFIG_PATH=examples/md-config/agents.yaml
#
# Agents:
#   - basketball  — NBA stats expert (GenericAgent)
#   - psychologist — sports psychologist (GenericAgent)
#   - notifications — trivia generator (Pollen+Bloom)

version: "1"

defaults:
  llm:
    model: "ollama/llama3.2"
    temperature: 0.2
  rag:
    enabled: false

# ── Global guardrails ────────────────────────────────────────
guardrails:
  input:
    - type: prompt_injection
      fail_action: block
    - type: content_safety
      fail_action: block
    - type: max_length
      fail_action: block
      config:
        max_characters: 5000
  output:
    - type: pii_detection
      fail_action: redact
      config:
        entities: [email, phone, ssn]

# ── Built-in tools ────────────────────────────────────────────
tools:
  get_player_stats:
    class: "examples.basketball.tools.basketball.GetPlayerStatsTool"
    description: "Get stats for an NBA player (points, rebounds, assists, team, position)"
  compare_players:
    class: "examples.basketball.tools.basketball.ComparePlayersTool"
    description: "Side-by-side comparison of two NBA players with advantage analysis"
  get_team_roster:
    class: "examples.basketball.tools.basketball.GetTeamRosterTool"
    description: "Get all players on a given NBA team"
  assess_motivation:
    class: "examples.basketball.tools.psychology.AssessMotivationTool"
    description: "Assess a player's motivation level, drive type, and risk factors"
  suggest_mental_strategy:
    class: "examples.basketball.tools.psychology.SuggestMentalStrategyTool"
    description: "Suggest mental performance strategies for a given situation (e.g. slump, pressure)"
  analyze_team_dynamics:
    class: "examples.basketball.tools.psychology.AnalyzeTeamDynamicsTool"
    description: "Analyze team chemistry, cohesion, and group motivation patterns"

# ── Orchestrator-level skills (cross-agent) ───────────────────
skills:
  player_performance_review:
    description: >
      Get a player's stats and performance data, then assess their
      motivation and mental state with actionable recommendations.
    steps:
      - agent: basketball
        instruction: "Look up the player's current stats and performance data"
      - agent: psychologist
        instruction: "Based on the player's stats and situation, assess their motivation and suggest mental strategies"
  team_wellness_check:
    description: >
      Review a team's full roster and then analyze group dynamics,
      cohesion, and motivation across the team.
    steps:
      - agent: basketball
        instruction: "Get the full roster for the specified team with all player stats"
      - agent: psychologist
        instruction: "Analyze the team's dynamics, cohesion, and suggest group motivation strategies"

# ── Agents ────────────────────────────────────────────────────
agents:
  basketball:
    description: >
      NBA basketball expert. Knows player stats, team rosters,
      and can compare players head-to-head. Use for any basketball
      data or analysis question.
    prompt: |
      You are a Basketball Expert AI assistant.
      You have access to player statistics and team rosters via built-in tools.

      Given the user's question and any data from your tools,
      provide insightful basketball analysis. Be specific with numbers.

      Focus on:
      - Player performance metrics (PPG, RPG, APG)
      - Team composition and strengths
      - Head-to-head player comparisons
      - Data-driven insights and historical context

      Be concise, engaging, and use the stats to support your analysis.
    tools:
      - get_player_stats
      - compare_players
      - get_team_roster
    guardrails:
      input:
        - type: topic_restriction
          fail_action: warn
          config:
            allowed_topics: [basketball, nba, player, team, stats, roster, game, season, score, draft, trade, mvp, playoffs, finals, championship, court, dunk, rebound, assist, three-pointer]
    skills:
      scouting_report:
        description: "Get a player's stats then compare them with a rival"
        steps:
          - tool: get_player_stats
            source: builtin
          - tool: compare_players
            source: builtin
    execution_hints:
      parallel_safe: true

  psychologist:
    description: >
      Sports psychologist specialized in player motivation,
      mental toughness, and team dynamics. Use when the question
      involves motivation, mental health, team chemistry,
      performance anxiety, or slumps.
    prompt: |
      You are a Sports Psychologist AI assistant specialized in
      basketball player motivation and team dynamics.

      Given the user's question and any context from other agents or tools,
      provide evidence-based psychological insights.

      Focus on:
      - Motivation assessment and contributing factors
      - Mental performance strategies and techniques
      - Team cohesion and interpersonal dynamics
      - Actionable, practical recommendations

      Be empathetic, professional, and grounded in sports psychology principles.
    tools:
      - assess_motivation
      - suggest_mental_strategy
      - analyze_team_dynamics
    guardrails:
      input:
        - type: topic_restriction
          fail_action: warn
          config:
            allowed_topics: [motivation, psychology, mental, mindset, confidence, anxiety, pressure, slump, performance, team dynamics, chemistry, cohesion, focus, resilience, burnout]
    skills:
      full_assessment:
        description: "Assess a player's motivation then suggest tailored mental strategies"
        steps:
          - tool: assess_motivation
            source: builtin
          - tool: suggest_mental_strategy
            source: builtin
    execution_hints:
      parallel_safe: true

  notifications:
    description: >
      Lightweight content-generation agent used by the morning-trivia
      Pollen + Bloom example.  Receives a prompt template at fire time
      and produces the digest using the basketball stats already
      available via the built-in tools.
    prompt: |
      You are a Basketball Trivia Generator.  Produce concise, factual
      output following the template in the user message.  Each fact must
      cite a source game or stat line.  Format as Markdown.
    tools:
      - get_player_stats
      - get_team_roster
    execution_hints:
      parallel_safe: true

# ── Pollen + Bloom (events) ──────────────────────────────────
events:
  enabled: true
  store:
    class: orchid_ai.events.backends.sqlite.SQLiteEventStorage
    extra_args:
      dsn: /data/chats.db
  queue:
    class: orchid_ai.events.queues.sqlite.SQLiteSignalQueue
    poll_interval_ms: 200
    lease_seconds: 30
    max_attempts: 3
  scheduler:
    class: orchid_ai.events.schedulers.apscheduler.APSchedulerBackend
  producers:
    - class: orchid_ai.events.producers.scheduler.SchedulerProducer
    - class: orchid_ai.events.producers.internal.InternalEmissionProducer
  processors:
    - class: orchid_ai.events.processors.asyncio_pool.AsyncioWorkerPoolProcessor
      concurrency: 1
  schedules:
    - id: morning-trivia-cron
      cron: "0 7 * * 1-5"
      trigger_id: morning-trivia
      identity: { mode: service_account, name: trivia-bot }
  triggers:
    - id: morning-trivia
      "on": { signal: cron, cron: "0 7 * * 1-5" }
      emits:
        agent: notifications
        prompt_template: |
          Produce a 3-fact NBA trivia digest based on yesterday's games.
          Each fact must cite the source game.  Format as Markdown.
        identity: { mode: service_account, name: trivia-bot }
        visibility: tenant
      retry: { max: 2, backoff: exponential }
      parallelism: unbounded
