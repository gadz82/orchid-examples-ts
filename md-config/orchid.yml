# orchid.yml — MD Config demo fallback runtime config (TypeScript port)
#
# This YAML provides the runtime half of the configuration. Agent definitions
# live in ./agents.yaml.
#
# Usage:
#   ORCHID_CONFIG=orchid.yml node orchid-api-ts/dist/cli.js
#
# Or via docker-compose:
#   docker compose up --build

version: "1"

# Agent behaviour config
agents:
  config_path: ./agents.yaml

# Default LLM provider
llm:
  model: ollama/llama3.2
  ollama_api_base: http://host.docker.internal:11434

# Auth
auth:
  dev_bypass: true

# RAG disabled — demo uses in-memory tool data only
rag:
  vector_backend: qdrant
  qdrant_url: ""
  embedding_model: ollama/nomic-embed-text

# Chat persistence (SQLite default)
storage:
  class: sqlite
  dsn: ./.orchid-md-config.db

# Tracing
tracing:
  langsmith_tracing: false
