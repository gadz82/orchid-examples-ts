# orchid.yml — Basketball demo configuration
#
# Fallback YAML for comparison with MD config.
# This is identical to examples/basketball/orchid.yml.
#
# Usage:
#   ORCHID_CONFIG=examples/md-orchid.yml uvicorn orchid_api.main:app

# ── Agents ────────────────────────────────────────────────────
agents:
  config_path: examples/md-agents.yaml

# ── LLM ───────────────────────────────────────────────────────
llm:
  model: ollama/llama3.2
  ollama_api_base: http://host.docker.internal:11434

# ── Auth ──────────────────────────────────────────────────────
auth:
  dev_bypass: true

# ── RAG / Vector DB ──────────────────────────────────────────
rag:
  vector_backend: qdrant
  qdrant_url: http://qdrant:6333
  embedding_model: ollama/nomic-embed-text

# ── Document upload ───────────────────────────────────────────
upload:
  vision_model: ollama/minicpm-v
  namespace: uploads
  max_size_mb: 20
  chunk_size: 1000
  chunk_overlap: 200

# ── Chat persistence ─────────────────────────────────────────
storage:
  class: orchid_ai.persistence.sqlite.OrchidSQLiteChatStorage
  dsn: /data/chats.db

# ── Observability ─────────────────────────────────────────────
tracing:
  langsmith_tracing: false
