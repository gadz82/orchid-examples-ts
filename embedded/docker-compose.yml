# docker-compose.yml — Embedded TypeScript example
#
# Services: qdrant, postgres (infrastructure only)
# This example runs scripts directly (not an API server).
# Use docker compose to start infrastructure, then run scripts on the host.
#
# Usage:
#   cp .env.example .env
#   docker compose up -d qdrant postgres
#   npm install
#   npx tsx main.ts

services:

  # ── Qdrant ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes:
      - qdrant_data:/qdrant/storage

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orchid
      POSTGRES_USER: orchid
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orchid}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchid"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  qdrant_data:
  postgres_data:
