# orchid.yml — Orchid Experts demo configuration
#
# Self-contained demo: ten RAG-powered GenericAgent experts, each the
# chief of knowledge for one orchid-* package or cross-cutting concept.
# No MCP servers or external APIs required.
#
# Usage:
#   ORCHID_CONFIG=orchid.yml uvicorn orchid_api.main:app

# ── Agents ────────────────────────────────────────────────────
agents:
  config_path: agents.yaml

# ── LLM ───────────────────────────────────────────────────────
llm:
  model: ollama/llama3.2
  ollama_api_base: http://host.docker.internal:11434

# ── Auth ──────────────────────────────────────────────────────
auth:
  dev_bypass: false
  identity_resolver_class: examples.orchid_experts.identity.ExpertsIdentityResolver

# ── RAG / Vector DB ──────────────────────────────────────────
rag:
  vector_backend: qdrant
  qdrant_url: http://qdrant:6333
  embedding_model: ollama/nomic-embed-text

# ── Document upload ───────────────────────────────────────────
upload:
  vision_model: ollama/minicpm-v
  namespace: uploads
  max_size_mb: 20
  chunk_size: 1000
  chunk_overlap: 200

# ── Chat persistence ─────────────────────────────────────────
storage:
  class: orchid_ai.persistence.sqlite.OrchidSQLiteChatStorage
  dsn: /data/experts_chats.db

# ── Agent config storage (database-backed) ────────────────────
# To manage agent configs via PostgreSQL instead of agents.yaml:
# config_storage:
#   enabled: true
#   class: orchid_storage_postgres.config_storage.OrchidPostgresConfigStorage  # install orchid-storage-postgres plugin
#   dsn: postgresql://user:pass@host:5432/db

# ── Startup hook seeds knowledge into RAG ────────────────────
startup:
  hook: examples.orchid_experts.hooks.startup.seed_experts_knowledge

# ── Observability ─────────────────────────────────────────────
tracing:
  langsmith_tracing: false
