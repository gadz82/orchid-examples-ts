# orchid.yml — Education fleet demo configuration (TypeScript port)
#
# Turns uploaded course material into quizzes, lesson plans, and
# multi-format export packages.
#
# Usage:
#   cd workspace-ts/examples-ts/education
#   npm install && npm start

version: "1"

agents:
  config_path: ./agents.yaml

llm:
  model: gemini/gemini-flash-latest
  gemini_api_key: ${GEMINI_API_KEY}

auth:
  dev_bypass: true

rag:
  vector_backend: qdrant
  qdrant_url: http://qdrant:6333
  embedding_model: gemini/gemini-embedding-001
  gemini_api_key: ${GEMINI_API_KEY}

storage:
  class: sqlite
  dsn: ./.orchid-education.db

startup:
  hook: ./hooks/startup.ts#bootstrapEducation

tracing:
  langsmith_tracing: false
